name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, arch: amd64 }
          - { os: ubuntu-24.04-arm, arch: arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: stable }
      - run: go vet ./...
      - run: go test -v ./...
      - name: coverage gate (100%)
        run: |
          go test -covermode=atomic -coverprofile=cov.out ./...
          pct=$(go tool cover -func=cov.out | awk '/^total:/{print $3}')
          echo "coverage=$pct"
          [ "$pct" = "100.0%" ] || { echo "coverage below 100%"; exit 1; }
      - run: go test -run '^$' -fuzz FuzzDot -fuzztime 20s ./...

  # The arm64 NEON kernel uses the integer widening multiply (VSMULL/VUMULL) and
  # the VSXTL/VUXTL widening the Go arm64 assembler only gained in Go 1.27, so it
  # builds under //go:build arm64 && go1.27. Exercise it on the gotip (1.27-devel)
  # toolchain on native arm64, fuzz it bit-exact against the scalar reference, and
  # gate it at 100% — this is the only job that compiles and covers
  # dispatch_arm64.go / kernels_arm64.s. On stable Go (the native job above) arm64
  # runs the scalar fallback instead.
  test-arm64-go1_27:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: stable }
      - run: go install golang.org/dl/gotip@latest && gotip download
      - run: gotip version
      - run: gotip vet ./...
      - run: gotip test -v ./...
      - run: gotip test -run '^$' -fuzz FuzzDot -fuzztime 20s ./...
      - name: coverage gate (100%, NEON)
        run: |
          gotip test -covermode=atomic -coverprofile=cov.out ./...
          pct=$(gotip tool cover -func=cov.out | awk '/^total:/{print $3}')
          echo "coverage=$pct"
          [ "$pct" = "100.0%" ] || { echo "coverage below 100%"; exit 1; }

  emulated:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: riscv64, image: "debian:trixie", qemu: "rv64,v=true,vlen=128" }
          - { arch: loong64, image: "ghcr.io/loong64/debian:trixie", qemu: "la464" }
          - { arch: ppc64le, image: "debian:trixie", qemu: "power9" }
          - { arch: s390x,   image: "debian:trixie", qemu: "qemu" }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: stable }
      - run: docker run --privileged --rm tonistiigi/binfmt --install all
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} go test -c -cover -o /tmp/t.test .
      - run: docker run --rm --platform linux/${{ matrix.arch }} -e QEMU_CPU=${{ matrix.qemu }} -v /tmp:/t ${{ matrix.image }} /t/t.test -test.v -test.coverprofile=/t/cov.out
      - name: coverage gate (100%)
        run: |
          pct=$(go tool cover -func=/tmp/cov.out | awk '/^total:/{print $3}')
          echo "coverage=$pct"
          [ "$pct" = "100.0%" ] || { echo "coverage below 100%"; exit 1; }
